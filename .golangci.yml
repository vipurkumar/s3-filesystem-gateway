version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/vipurkumar/s3-filesystem-gateway

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
